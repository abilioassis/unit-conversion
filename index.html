<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Unit Conversion</title>
  </head>
  <body>
    <main>
      <!-- Section A -->
      <section id="section-a">
        <h1>Metric/Imperial Unit Conversion</h1>
        <input id="quantity" type="number" />
        <button id="convert-btn">Convert</button>
      </section>
      <!-- Section B -->
      <section id="section-b">
        <div class="container">
          <article class="unit-conversion">
            <h2>Length (Meter/Feet)</h2>
            <p id="meters-conversion">20 meters = 65.616 feet</p>
            <p id="feet-conversion">20 feet = 6.096 meters</p>
          </article>
          <article class="unit-conversion">
            <h2>Volume (Liters/Gallons)</h2>
            <p id="liter-conversion">20 liters = 5.284 gallons</p>
            <p id="gallon-conversion">20 gallons = 75.708 liters</p>
          </article>
          <article class="unit-conversion">
            <h2>Mass (Kilograms/Pounds)</h2>
            <p id="kilo-convertion">20 kilos = 44.092 pounds</p>
            <p id="pound-convertion">20 pounds = 9.072 kilos</p>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
